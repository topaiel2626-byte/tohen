version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: strategic-inbox-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: strategic-inbox-backend
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=strategic_inbox
      - CORS_ORIGINS=*

  frontend:
    build: ./frontend
    container_name: strategic-inbox-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - BACKEND_URL=
    ports:
      - "80:80"

volumes:
  mongo_data:
